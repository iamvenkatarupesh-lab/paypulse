# Default values for paypulse chart.
# Override per-environment via -f values-{env}.yaml or --set key=value.

namespace: paypulse

image:
  registry: ghcr.io/iamvenkatarupesh-lab
  pullPolicy: Always

backend:
  enabled: true
  name: paypulse-backend
  image:
    repository: paypulse-backend
    tag: latest
  replicas: 2
  port: 3001
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"
  env:
    NODE_ENV: "production"
    LOG_LEVEL: "info"
    CORS_ORIGIN: "http://paypulse.local"

frontend:
  enabled: true
  name: paypulse-frontend
  image:
    repository: paypulse-frontend
    tag: latest
  replicas: 2
  port: 3000
  resources:
    requests:
      cpu: "100m"
      memory: "200Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    NODE_ENV: "production"
    NEXT_TELEMETRY_DISABLED: "1"
    NEXT_PUBLIC_API_URL: "http://paypulse.local/api"

postgres:
  enabled: true
  name: paypulse-postgres
  image: postgres:16-alpine
  port: 5432
  storageSize: 1Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  auth:
    user: paypulse
    database: paypulse
    # NOTE: dev-only password. In real environments, inject via external secret.
    password: paypulse_dev_password_change_me

ingress:
  enabled: true
  className: nginx
  host: paypulse.local
