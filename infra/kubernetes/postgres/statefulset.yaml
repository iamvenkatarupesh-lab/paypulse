apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paypulse-postgres
  namespace: paypulse
  labels:
    app: paypulse-postgres
    app.kubernetes.io/name: paypulse-postgres
    app.kubernetes.io/component: database
spec:
  serviceName: paypulse-postgres  # Must match the headless Service above
  replicas: 1
  selector:
    matchLabels:
      app: paypulse-postgres
  template:
    metadata:
      labels:
        app: paypulse-postgres
        app.kubernetes.io/name: paypulse-postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paypulse-postgres-config
            - secretRef:
                name: paypulse-postgres-secret
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
