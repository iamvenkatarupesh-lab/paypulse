apiVersion: v1
kind: Service
metadata:
  name: paypulse-postgres
  namespace: paypulse
  labels:
    app: paypulse-postgres
spec:
  # Headless: no ClusterIP, DNS returns pod IPs directly.
  # Required for StatefulSet stable per-pod DNS.
  clusterIP: None
  selector:
    app: paypulse-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
