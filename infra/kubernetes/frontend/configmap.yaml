apiVersion: v1
kind: ConfigMap
metadata:
  name: paypulse-frontend-config
  namespace: paypulse
  labels:
    app: paypulse-frontend
data:
  NODE_ENV: "production"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXT_PUBLIC_API_URL: "http://paypulse-backend.paypulse.svc.cluster.local:3001"
