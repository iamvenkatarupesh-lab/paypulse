apiVersion: apps/v1
kind: Deployment
metadata:
  name: paypulse-backend
  namespace: paypulse
  labels:
    app: paypulse-backend
    app.kubernetes.io/name: paypulse-backend
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: paypulse-backend
  template:
    metadata:
      labels:
        app: paypulse-backend
        app.kubernetes.io/name: paypulse-backend
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/iamvenkatarupesh-lab/paypulse-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: paypulse-backend-config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
