name: CI

# Run on every push to main and on every pull request targeting main.
# This catches breakages before they land.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
# Saves CI minutes and avoids stale checks.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # Backend: TypeScript typecheck + build
  # ============================================
  backend:
    name: Backend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies (clean, lockfile-strict)
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build

  # ============================================
  # Frontend: ESLint + Next.js build
  # ============================================
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean, lockfile-strict)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
